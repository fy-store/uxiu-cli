name: Test and publish

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: publish-master
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:run

  publish-npm:
    name: Publish npm package
    if: github.repository == 'fy-store/uxiu-cli'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm
        run: npm install --global npm@latest

      - name: Build package
        run: pnpm build:core

      - name: Check package version
        id: package
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          versions=$(npm view uxiu-cli versions --json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          if VERSION="$version" VERSIONS="$versions" node -e "
            const versions = JSON.parse(process.env.VERSIONS)
            const list = Array.isArray(versions) ? versions : [versions]
            process.exit(list.includes(process.env.VERSION) ? 0 : 1)
          "; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "uxiu-cli@${version} already exists; skipping npm publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.package.outputs.publish == 'true'
        run: npm publish --access public --provenance